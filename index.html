<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BioCore - Controle de Medidas</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <aside class="sidebar">
            <h2>BioCore</h2>
            <nav>
                <button onclick="showSection('dashboard')">Dashboard</button>
                <button onclick="showSection('registro')">Novo Registro</button>
            </nav>
        </aside>

        <main class="content">
            <section id="dashboard">
                <h1>Seu Progresso</h1>
                <div class="stats-grid">
                    <div class="card">
                        <h3>Último IMC</h3>
                        <p id="display-imc">--</p>
                    </div>
                    <div class="card">
                        <h3>Peso Atual</h3>
                        <p id="display-peso">0 kg</p>
                    </div>
                </div>
                <ul id="historico" class="history-list">
                    </ul>
            </section>

            <section id="registro" class="hidden">
                <h1>Registrar Medida</h1>
                <form id="form-medidas">
                    <input type="number" id="peso" placeholder="Peso (kg)" step="0.1" required>
                    <input type="number" id="altura" placeholder="Altura (m)" step="0.01" required>
                    <button type="submit">Salvar no Navegador</button>
                </form>
            </section>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
